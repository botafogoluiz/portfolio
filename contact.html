<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Contact Luiz Silva" />
    <meta name="author" content="Luiz Silva" />
    <title>Luiz Silva - Contact</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@100;200;300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css" rel="stylesheet" />
    <link href="css/styles.css" rel="stylesheet" />
</head>

<body class="d-flex flex-column">
    <main class="flex-shrink-0">
        <nav class="navbar navbar-expand-lg navbar-light bg-white py-3">
            <div class="container px-5">
                <a class="navbar-brand" href="index.html"><span class="fw-bolder text-primary">Luiz Silva</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation"><span
                        class="navbar-toggler-icon"></span></button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0 small fw-bolder">
                        <li class="nav-item"><a class="nav-link" href="index.html" data-i18n="nav_home">Home</a></li>
                        <li class="nav-item"><a class="nav-link" href="resume.html" data-i18n="nav_resume">Resume</a>
                        </li>
                        <li class="nav-item"><a class="nav-link" href="projects.html"
                                data-i18n="nav_projects">Projects</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html" data-i18n="nav_contact">Contact</a>
                        </li>
                        <li class="nav-item mx-2 d-none d-lg-block text-muted">|</li>
                        <li class="nav-item"><a class="nav-link" href="#" id="btn-lang-pt"
                                onclick="setLanguage('pt'); return false;">PT</a></li>
                        <li class="nav-item"><a class="nav-link fw-bolder text-primary" href="#" id="btn-lang-en"
                                onclick="setLanguage('en'); return false;">EN</a></li>
                    </ul>
                </div>
            </div>
        </nav>
        <section class="py-5">
            <div class="container px-5">
                <div class="bg-light rounded-4 py-5 px-4 px-md-5">
                    <div class="text-center mb-5">
                        <div class="feature bg-primary bg-gradient-primary-to-secondary text-white rounded-3 mb-3"><i
                                class="bi bi-envelope"></i></div>
                        <h1 class="fw-bolder" data-i18n="contact_title">Get in touch</h1>
                        <p class="lead fw-normal text-muted mb-0" data-i18n="contact_subtitle">Let's work together!</p>
                    </div>
                    <div class="row gx-5 justify-content-center">
                        <div class="col-lg-8 col-xl-6">
                            <form id="contactForm" action="https://formsubmit.co/luiz.g.s.silva@gmail.com"
                                method="POST">
                                <input type="hidden" name="_subject" value="New submission from your portfolio!">
                                <input type="hidden" name="_template" value="table">
                                <input type="hidden" name="_captcha" value="false">
                                <div id="formInputs">
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="name" name="Full_Name" type="text"
                                            placeholder="Enter your name..." required
                                            data-i18n="contact_name_placeholder" />
                                        <label for="name" data-i18n="contact_name_label">Full name</label>
                                        <div class="invalid-feedback" data-i18n="contact_error_name_required">A name is
                                            required.</div>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="email" name="Email_Address" type="email"
                                            placeholder="name@example.com" required
                                            data-i18n="contact_email_placeholder" />
                                        <label for="email" data-i18n="contact_email_label">Email address</label>
                                        <div class="invalid-feedback" data-i18n="contact_error_email_required">A valid
                                            email is required.</div>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <input class="form-control" id="phone" name="Phone_Number" type="tel"
                                            placeholder="(123) 456-7890" required
                                            data-i18n="contact_phone_placeholder" />
                                        <label for="phone" data-i18n="contact_phone_label">Phone number</label>
                                        <div class="invalid-feedback" data-i18n="contact_error_phone_required">A phone
                                            number is required.</div>
                                    </div>
                                    <div class="form-floating mb-3">
                                        <textarea class="form-control" id="message" name="Message"
                                            placeholder="Enter your message here..." style="height: 10rem" required
                                            data-i18n="contact_message_placeholder"></textarea>
                                        <label for="message" data-i18n="contact_message_label">Message</label>
                                        <div class="invalid-feedback" data-i18n="contact_error_message_required">A
                                            message is required.</div>
                                    </div>
                                    <div class="d-grid">
                                        <button class="btn btn-primary btn-lg" id="submitButton" type="submit"
                                            data-i18n="contact_submit">Submit</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <footer class="bg-white py-4 mt-auto">
        <div class="container px-5">
            <div class="row align-items-center justify-content-between flex-column flex-sm-row">
                <div class="col-auto">
                    <div class="small m-0" data-i18n="footer_copyright">Copyright &copy; Luiz Silva 2024</div>
                </div>
                <div class="col-auto">
                    <a class="small" href="#!" data-i18n="footer_privacy">Privacy</a>
                    <span class="mx-1">&middot;</span>
                    <a class="small" href="#!" data-i18n="footer_terms">Terms</a>
                    <span class="mx-1">&middot;</span>
                    <a class="small" href="contact.html" data-i18n="nav_contact">Contact</a>
                </div>
            </div>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/translations.js"></script>
    <script src="js/language.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const form = document.getElementById('contactForm');
            const submitButton = document.getElementById('submitButton');

            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                } else {
                    // Visual feedback only
                    submitButton.classList.add('disabled');
                    submitButton.style.pointerEvents = 'none';
                    submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Sending...';
                }
                form.classList.add('was-validated');
            }, false);
        });
    </script>
</body>

</html>
